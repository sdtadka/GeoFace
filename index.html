const { useState, useEffect, useRef, useCallback } = React;

// ---------- CONFIG ----------
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxrIK04ba7wAEiAjIVnkhrJAeR8uMG7aoBiJZTBysglockWimM4-fP5_KtO7ZL0NO5RPQ/exec'; // <-- Deploy ke baad URL daalo
const SESSION_KEY = 'gfg_user';

// ---------- API ----------
async function callGAS(fn, args=[]) {
  const resp = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ fn, args }),
    headers: { 'Content-Type': 'text/plain' }
  });
  const json = await resp.json();
  if (!json.ok) throw new Error(json.error || 'Unknown error');
  return json.data;
}

const Api = {
  login: (email) => callGAS('login', [email]),
  register: (name, email, mobile, role, department, designation) => 
    callGAS('register', [name, email, mobile, role, department, designation]),
  getUsers: () => callGAS('getUsers'),
  getUserById: (id) => callGAS('getUserById', [id]),
  updateUser: (id, updates) => callGAS('updateUser', [id, updates]),
  toggleUserApproval: (id) => callGAS('toggleUserApproval', [id]),
  toggleUserActive: (id) => callGAS('toggleUserActive', [id]),
  updateProfilePicture: (id, img) => callGAS('updateProfilePicture', [id, img]),
  deleteProfile: (id) => callGAS('deleteProfile', [id]),
  createUser: (d) => callGAS('createUser', [d]),
  markAttendance: (d) => callGAS('markAttendance', [d]),
  markCheckOut: (id) => callGAS('markCheckOut', [id]),
  getAttendanceRecords: () => callGAS('getAttendanceRecords'),
  getTodayAttendance: () => callGAS('getTodayAttendance'),
  getWorkerHistory: (id) => callGAS('getWorkerHistory', [id]),
  getWorkerStats: (id) => callGAS('getWorkerStats', [id]),
  deleteAttendanceRecord: (id) => callGAS('deleteAttendanceRecord', [id]),
  getConfig: () => callGAS('getConfig'),
  updateConfig: (c) => callGAS('updateConfig', [c]),
  applyLeave: (userId, fromDate, toDate, reason) => 
    callGAS('applyLeave', [userId, fromDate, toDate, reason]),
  getLeaveRequests: () => callGAS('getLeaveRequests'),
  getLeaveRequestsByUser: (id) => callGAS('getLeaveRequestsByUser', [id]),
  approveLeave: (id, adminId) => callGAS('approveLeave', [id, adminId]),
  rejectLeave: (id) => callGAS('rejectLeave', [id]),
  getNotifications: (id) => callGAS('getNotifications', [id]),
  markNotificationRead: (id) => callGAS('markNotificationRead', [id]),
  getDashboardStats: () => callGAS('getDashboardStats'),
};

// ---------- UTILS ----------
const calcDist = (lat1, lon1, lat2, lon2) => {
  const R = 6371e3, p = Math.PI/180;
  const a = 0.5 - Math.cos((lat2-lat1)*p)/2 + Math.cos(lat1*p)*Math.cos(lat2*p)*(1-Math.cos((lon2-lon1)*p))/2;
  return 2*R*Math.asin(Math.sqrt(a));
};
const getPos = () => new Promise((res,rej) => 
  navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true, timeout:10000})
);
const getToday = () => new Date().toISOString().split('T')[0];

const Ic = ({ n, s=20, c='' }) => (

// ---------- TOAST ----------
const Toast = ({ msg, type, onDone }) => {
  useEffect(() => { const t = setTimeout(onDone, 3000); return ()=>clearTimeout(t); }, []);
  const colors = { success: 'bg-emerald-600', error: 'bg-red-600', info: 'bg-blue-600', warning: 'bg-amber-600' };
  return (
    <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[999] px-5 py-3 rounded-2xl text-white font-semibold shadow-2xl text-sm animate-slide-up ${colors[type]||'bg-gray-800'}`}>
      {msg}
    </div>
  );
};
const Spin = ({ s=24 }) => (
  <div className="border-3 border-current border-t-transparent rounded-full animate-spin" style={{width:s,height:s,borderWidth:3}}/>
);

// ---------- FACE CAMERA ----------
const FaceCamera = ({ onCapture, scanning }) => {
  const videoRef = useRef(null), canvasRef = useRef(null);
  const [hasFace, setHasFace] = useState(false);
  const [facing, setFacing] = useState('user');
  const streamRef = useRef(null);

  useEffect(() => {
    const startCam = async () => {
      if (streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing, width:640, height:480 } });
        streamRef.current = s;
        if (videoRef.current) videoRef.current.srcObject = s;
      } catch(e) { alert('Camera error: '+e.message); }
    };
    startCam();
    return () => { if (streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); };
  }, [facing]);

  useEffect(() => {
    if (!window.FaceMesh) return;
    const fm = new window.FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    fm.setOptions({ maxNumFaces: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    fm.onResults(r => setHasFace(r.multiFaceLandmarks?.length > 0));
    let cam;
    const v = videoRef.current;
    if (v) {
      cam = new window.Camera(v, { onFrame: async () => { try { await fm.send({image:v}); } catch(e){} }, width:640, height:480 });
      cam.start();
    }
    return () => { try { cam?.stop(); fm.close(); } catch(e){} };
  }, []);

  const capture = () => {
    const cv = canvasRef.current, ctx = cv.getContext('2d');
    ctx.clearRect(0,0,640,480);
    ctx.save();
    if (facing === 'user') { ctx.translate(640,0); ctx.scale(-1,1); }
    ctx.drawImage(videoRef.current,0,0,640,480);
    ctx.restore();
    onCapture(cv.toDataURL('image/jpeg',0.85));
  };

  return (
    <div className="relative w-full max-w-sm mx-auto rounded-3xl overflow-hidden shadow-2xl bg-black">
      <video ref={videoRef} autoPlay playsInline muted className={`w-full h-72 object-cover ${facing==='user'?'scale-x-[-1]':''}`}/>
      <canvas ref={canvasRef} className="hidden" width={640} height={480}/>
      <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-52 face-outline pointer-events-none ${hasFace?'face-detected':''}`}/>
      {hasFace && !scanning && <div className="absolute left-0 right-0 h-0.5 bg-green-400/60 scan-line pointer-events-none" style={{top:0}}/>}
      <div className="absolute top-3 left-3 right-3 flex justify-center">
        <span className={`px-3 py-1 rounded-full text-xs font-bold ${hasFace?'bg-green-500 text-white':'bg-black/60 text-white/70'}`}>
          {hasFace ? '✓ Face Detected' : 'Position your face'}
        </span>
      </div>
      <div className="absolute top-3 right-3 flex flex-col gap-2">
        <button onClick={()=>setFacing(f=>f==='user'?'environment':'user')} className="p-2 bg-black/50 text-white rounded-full hover:bg-black/80">
          <Ic n="refresh" s={18}/>
        </button>
      </div>
      <div className="bg-gray-900 py-4 flex justify-center">
        <button onClick={capture} disabled={!hasFace || scanning}
          className={`relative w-16 h-16 rounded-full border-4 transition-all ${hasFace&&!scanning ? 'border-white bg-white hover:scale-110' : 'border-gray-600 bg-gray-600 cursor-not-allowed'}`}>
          {scanning && <div className="absolute inset-0 rounded-full border-4 border-blue-500 border-t-transparent animate-spin"/>}
        </button>
      </div>
    </div>
  );
};

// ---------- PHOTO MODAL ----------
const PhotoModal = ({ record, onClose, isAdmin }) => {
  const [loading, setLoading] = useState(false);

  const download = async () => {
    setLoading(true);
    try {
      const a = document.createElement('a');
      a.href = record.imageUrl;
      a.download = `Attendance_${record.userName?.replace(/\s/g,'_')}_${record.date}.jpg`;
      a.click();
    } catch(e) { alert('Download failed: '+e.message); }
    setLoading(false);
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-4 animate-fade-in" onClick={onClose}>
      <div className="bg-white rounded-3xl max-w-sm w-full overflow-hidden shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="relative bg-gray-900 aspect-[4/3]">
          <img src={record.imageUrl} className="w-full h-full object-cover" crossOrigin="anonymous" onError={e=>e.target.style.display='none'}/>
          <button onClick={onClose} className="absolute top-3 right-3 bg-black/60 text-white rounded-full p-1.5"><Ic n="x" s={18}/></button>
          {isAdmin && (
            <div className={`absolute bottom-0 left-0 right-0 py-2 text-center font-bold text-sm text-white ${record.geoStatus==='INSIDE'?'bg-green-600/90':'bg-red-600/90'}`}>
              {record.geoStatus==='INSIDE' ? '✓ INSIDE GEO-FENCE' : '✗ OUTSIDE GEO-FENCE'} — {record.status}
            </div>
          )}
        </div>
        <div className="p-4 space-y-2">
          <div className="text-sm text-gray-600">
            <div className="font-bold text-gray-800">{record.userName}</div>
            <div className="flex items-center gap-1 text-xs"><Ic n="clock" s={12}/> {record.checkInTime} | {record.date}</div>
            <div className="flex items-center gap-1 text-xs"><Ic n="map" s={12}/> {parseFloat(record.latitude).toFixed(5)}, {parseFloat(record.longitude).toFixed(5)}</div>
            <div className="text-xs">Distance: {Math.round(record.distanceFromCenter)}m | Working: {record.workingHours || 0}h</div>
          </div>
          <button onClick={download} disabled={loading} className="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 text-sm">
            {loading ? <Spin s={18}/> : <><Ic n="download" s={16}/> Download Photo</>}
          </button>
          <a href={`https://maps.google.com/?q=${record.latitude},${record.longitude}`} target="_blank" rel="noreferrer"
             className="block text-center text-blue-600 text-xs font-semibold py-1 hover:underline">View on Google Maps ↗</a>
        </div>
      </div>
    </div>
  );
};

// ---------- WORKER PORTAL ----------
const WorkerPortal = ({ user, config, onLogout, toast }) => {
  const [tab, setTab] = useState('home');
  const [stats, setStats] = useState(null);
  const [history, setHistory] = useState([]);
  const [selRec, setSelRec] = useState(null);
  const [scanState, setScanState] = useState('idle');
  const [scanMsg, setScanMsg] = useState('');
  const [loading, setLoading] = useState(true);
  const [mobile, setMobile] = useState(user.mobile || '');
  const [saving, setSaving] = useState(false);
  const [leaveForm, setLeaveForm] = useState({fromDate: getToday(), toDate: getToday(), reason: ''});
  const [leaveSubmitting, setLeaveSubmitting] = useState(false);
  const [leaves, setLeaves] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [showNotifs, setShowNotifs] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const [s, h, l, n] = await Promise.all([
        Api.getWorkerStats(user.id),
        Api.getWorkerHistory(user.id),
        Api.getLeaveRequestsByUser(user.id),
        Api.getNotifications(user.id)
      ]);
      setStats(s); setHistory(h); setLeaves(l); setNotifications(n);
    } catch(e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const handleCapture = async (imgData) => {
    setScanState('checking');
    try {
      const today = getToday();
      if (history.some(r => r.date === today && (r.status==='PRESENT'||r.status==='LATE'))) {
        setScanState('error'); setScanMsg('Aaj ki attendance pehle se mark hai!'); return;
      }
      const now = new Date();
      const h = now.getHours() + now.getMinutes()/60;
      const start = config.attendanceStart || 0, end = config.attendanceEnd || 18;
      const lateAfter = config.lateAfter || 9.5;
      if (h < start) { setScanState('error'); setScanMsg(`Attendance ${start}:00 se start`); return; }
      if (h > end) { setScanState('error'); setScanMsg(`Attendance ${end}:00 tak`); return; }
      let pos;
      try { pos = await getPos(); } catch(e) { setScanState('error'); setScanMsg('GPS error: '+e.message); return; }
      const dist = calcDist(pos.coords.latitude, pos.coords.longitude, config.latitude, config.longitude);
      if (dist > config.radius) {
        setScanState('error'); setScanMsg(`Door ho (${Math.round(dist)}m > ${config.radius}m)`); return;
      }
      const status = h >= lateAfter ? 'LATE' : 'PRESENT';
      await Api.markAttendance({
        userId: user.id,
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        imageUrl: imgData,
        distanceFromCenter: Math.round(dist),
        status: status
      });
      setScanState('success');
      setScanMsg(status==='LATE' ? 'Late Attendance ✅' : 'Attendance ✅');
      load();
    } catch(e) {
      setScanState('error'); setScanMsg(e.message || 'Error');
    }
  };

  const saveMobile = async () => {
    setSaving(true);
    try { await Api.updateUser(user.id, { mobile }); toast('Mobile saved!','success'); } catch(e) { toast(e.message,'error'); }
    setSaving(false);
  };

  const submitLeave = async (e) => {
    e.preventDefault(); setLeaveSubmitting(true);
    try {
      await Api.applyLeave(user.id, leaveForm.fromDate, leaveForm.toDate, leaveForm.reason);
      toast('Leave applied!','success');
      setLeaveForm({fromDate: getToday(), toDate: getToday(), reason: ''});
      load();
    } catch(e) { toast(e.message,'error'); }
    setLeaveSubmitting(false);
  };

  const todayRec = history.find(r => r.date === getToday());

  return (
    <div className="flex flex-col min-h-screen">
      <header className="bg-white border-b sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center"><Ic n="shield" s={16} c="text-white"/></div>
          <span className="font-bold text-gray-800">GeoFace<span className="text-blue-600">Guard</span></span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={()=>setShowNotifs(!showNotifs)} className="relative text-gray-400 hover:text-blue-600">
            <Ic n="bell" s={20}/>
            {notifications.filter(n => !n.isRead).length > 0 && (
              <span className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-[10px] rounded-full flex items-center justify-center">
                {notifications.filter(n => !n.isRead).length}
              </span>
            )}
          </button>
          <button onClick={onLogout} className="text-gray-400 hover:text-red-500 p-1"><Ic n="logout" s={20}/></button>
        </div>
      </header>

      {/* Notifications dropdown */}
      {showNotifs && (
        <div className="absolute top-14 right-4 w-72 max-h-60 overflow-y-auto bg-white rounded-2xl shadow-xl border z-50 p-2">
          <div className="font-bold text-sm text-gray-700 p-2 border-b">Notifications</div>
          {notifications.length === 0 ? (
            <div className="text-center py-4 text-gray-400 text-sm">No notifications</div>
          ) : (
            notifications.map(n => (
              <div key={n.id} className={`p-2 rounded-xl text-sm ${n.isRead ? 'text-gray-500' : 'bg-blue-50'}`}
                onClick={() => { Api.markNotificationRead(n.id); setNotifications(notifications.map(x => x.id===n.id ? {...x, isRead:true} : x)); }}>
                <div className="font-semibold text-gray-700">{n.title}</div>
                <div className="text-xs text-gray-500">{n.message}</div>
                <div className="text-[10px] text-gray-400">{new Date(n.createdAt).toLocaleString()}</div>
              </div>
            ))
          )}
        </div>
      )}

      <main className="flex-1 overflow-y-auto pb-24 px-4 pt-4 max-w-lg mx-auto w-full">
        {/* HOME TAB */}
        {tab === 'home' && (
          <div className="space-y-4 animate-fade-in">
            <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl p-5 text-white">
              <div className="flex items-center gap-4">
                <img src={user.photoUrl} className="w-14 h-14 rounded-2xl border-2 border-white/30 object-cover" onError={e=>e.target.src='https://ui-avatars.com/api/?name='+user.name}/>
                <div>
                  <h2 className="text-lg font-bold">{user.name}</h2>
                  <p className="text-blue-200 text-sm">{user.email}</p>
                  <p className="text-blue-200 text-xs">{user.designation} • {user.department}</p>
                </div>
              </div>
              <div className={`mt-4 flex items-center gap-2 text-sm font-semibold px-3 py-2 rounded-xl ${todayRec ? (todayRec.status==='LATE'?'bg-yellow-500/30':'bg-green-500/30') : 'bg-white/10'}`}>
                <Ic n={todayRec ? 'check' : 'clock'} s={16}/>
                {todayRec ? `Aaj ${todayRec.status} — ${todayRec.checkInTime}` : 'Aaj attendance nahi maari'}
              </div>
            </div>

            {loading ? <div className="flex justify-center py-8"><Spin s={32}/></div> : stats && (
              <div className="grid grid-cols-3 gap-3">
                <div className="bg-green-50 rounded-2xl p-4 text-center"><div className="text-2xl font-bold text-green-600">{stats.present}</div><div className="text-xs text-gray-500 font-semibold">Present</div></div>
                <div className="bg-yellow-50 rounded-2xl p-4 text-center"><div className="text-2xl font-bold text-yellow-600">{stats.late}</div><div className="text-xs text-gray-500 font-semibold">Late</div></div>
                <div className="bg-red-50 rounded-2xl p-4 text-center"><div className="text-2xl font-bold text-red-500">{stats.absent}</div><div className="text-xs text-gray-500 font-semibold">Absent</div></div>
              </div>
            )}

            {/* Quick Stats */}
            {stats && (
              <div className="bg-white rounded-2xl border p-4">
                <div className="flex justify-between text-sm">
                  <div><span className="text-gray-500">Attendance:</span> <span className="font-bold">{stats.attendancePercentage || 0}%</span></div>
                  <div><span className="text-gray-500">Total:</span> <span className="font-bold">{stats.totalRecords || 0}</span></div>
                  <div><span className="text-gray-500">Leaves:</span> <span className="font-bold">{leaves.filter(l => l.status === 'APPROVED').length}</span></div>
                </div>
              </div>
            )}

            {/* History */}
            <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
              <div className="px-4 py-3 border-b flex items-center justify-between">
                <h3 className="font-bold text-gray-800 flex items-center gap-2"><Ic n="clock" s={16} c="text-blue-500"/> History</h3>
                <button onClick={load} className="text-gray-400 hover:text-blue-600"><Ic n="refresh" s={16}/></button>
              </div>
              {history.length === 0 ? <div className="text-center py-8 text-gray-400 text-sm">No records</div> : (
                <div className="divide-y max-h-72 overflow-y-auto no-scrollbar">
                  {history.slice(0,20).map(r => (
                    <div key={r.id} className="flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                      <div className="flex items-center gap-3">
                        <div className={`w-1.5 h-10 rounded-full ${r.status==='PRESENT'?'bg-green-500':r.status==='LATE'?'bg-yellow-500':'bg-red-500'}`}/>
                        <div>
                          <div className="font-semibold text-sm text-gray-800">{r.date}</div>
                          <div className="text-xs text-gray-400">{r.checkInTime} {r.checkOutTime ? '- '+r.checkOutTime : ''}</div>
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${r.status==='PRESENT'?'bg-green-100 text-green-700':r.status==='LATE'?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-600'}`}>{r.status}</span>
                        <button onClick={()=>setSelRec(r)} className="text-gray-400 hover:text-blue-600"><Ic n="photo" s={16}/></button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* SCAN TAB */}
        {tab === 'scan' && (
          <div className="space-y-4 animate-fade-in">
            <h2 className="text-xl font-bold text-center text-gray-800 pt-2">Attendance Mark Karo</h2>
            {scanState === 'success' ? (
              <div className="bg-green-50 border-2 border-green-200 rounded-3xl p-8 text-center">
                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><Ic n="check" s={40} c="text-green-600"/></div>
                <div className="font-bold text-green-800 text-lg">{scanMsg}</div>
                <button onClick={()=>{setScanState('idle'); setTab('home');}} className="mt-6 bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">Back</button>
              </div>
            ) : (
              <>
                <FaceCamera onCapture={handleCapture} scanning={scanState==='checking'}/>
                {scanState === 'checking' && <div className="bg-blue-50 rounded-2xl p-4 text-center flex items-center justify-center gap-3"><Spin s={20}/> <span className="text-blue-700 font-semibold text-sm">Saving...</span></div>}
                {scanState === 'error' && <div className="bg-red-50 border border-red-200 rounded-2xl p-4 flex items-start gap-3"><Ic n="alert" s={20} c="text-red-500 shrink-0 mt-0.5"/><div className="font-semibold text-red-700 text-sm">{scanMsg}</div></div>}
                <div className="text-center text-xs text-gray-400">Window: {config.attendanceStart}:00 – {config.attendanceEnd}:00 | Radius: {config.radius}m</div>
              </>
            )}
          </div>
        )}

        {/* LEAVE TAB */}
        {tab === 'leave' && (
          <div className="space-y-4 animate-fade-in">
            <h2 className="text-xl font-bold text-gray-800">Leave Application</h2>
            <form onSubmit={submitLeave} className="bg-white rounded-2xl border p-5 space-y-3">
              <div>
                <label className="text-xs font-bold text-gray-500 block mb-1">From Date</label>
                <input type="date" required value={leaveForm.fromDate} onChange={e=>setLeaveForm({...leaveForm, fromDate:e.target.value})} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
              </div>
              <div>
                <label className="text-xs font-bold text-gray-500 block mb-1">To Date</label>
                <input type="date" required value={leaveForm.toDate} onChange={e=>setLeaveForm({...leaveForm, toDate:e.target.value})} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
              </div>
              <div>
                <label className="text-xs font-bold text-gray-500 block mb-1">Reason</label>
                <textarea required value={leaveForm.reason} onChange={e=>setLeaveForm({...leaveForm, reason:e.target.value})} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500" rows="2" placeholder="Leave reason..."/>
              </div>
              <button type="submit" disabled={leaveSubmitting} className="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2">
                {leaveSubmitting ? <Spin s={20}/> : 'Apply Leave'}
              </button>
            </form>

            <div className="bg-white rounded-2xl border overflow-hidden">
              <div className="px-4 py-3 border-b font-bold text-gray-700 text-sm">My Leaves</div>
              {leaves.length === 0 ? <div className="text-center py-4 text-gray-400 text-sm">No leave requests</div> : (
                <div className="divide-y">
                  {leaves.map(l => (
                    <div key={l.id} className="px-4 py-3 flex justify-between items-center">
                      <div>
                        <div className="font-semibold text-sm">{l.fromDate} to {l.toDate}</div>
                        <div className="text-xs text-gray-500">{l.reason}</div>
                      </div>
                      <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${l.status==='APPROVED'?'bg-green-100 text-green-700':l.status==='REJECTED'?'bg-red-100 text-red-600':'bg-yellow-100 text-yellow-700'}`}>{l.status}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* SETTINGS TAB */}
        {tab === 'settings' && (
          <div className="space-y-4 animate-fade-in">
            <div className="bg-white rounded-2xl border p-5 space-y-4">
              <h3 className="font-bold text-gray-800">Profile Settings</h3>
              <div className="flex items-center gap-4">
                <img src={user.photoUrl} className="w-16 h-16 rounded-2xl object-cover" onError={e=>e.target.src='https://ui-avatars.com/api/?name='+user.name}/>
                <div>
                  <div className="font-bold">{user.name}</div>
                  <div className="text-sm text-gray-500">{user.email}</div>
                  <div className="text-xs text-gray-400">{user.designation} • {user.department}</div>
                </div>
              </div>
              <div>
                <label className="text-xs font-bold text-gray-500 block mb-1">Mobile Number</label>
                <div className="flex gap-2">
                  <input value={mobile} onChange={e=>setMobile(e.target.value)} type="tel" placeholder="9XXXXXXXXX" className="flex-1 border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
                  <button onClick={saveMobile} disabled={saving} className="bg-blue-600 text-white px-4 rounded-xl font-bold text-sm flex items-center gap-1">
                    {saving ? <Spin s={16}/> : 'Save'}
                  </button>
                </div>
              </div>
              <div>
                <label className="text-xs font-bold text-gray-500 block mb-1">Emergency Contact</label>
                <input value={user.emergencyContact || ''} onChange={e=>Api.updateUser(user.id, { emergencyContact: e.target.value })} placeholder="Name" className="w-full border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
              </div>
              <div>
                <label className="text-xs font-bold text-gray-500 block mb-1">Emergency Phone</label>
                <input value={user.emergencyPhone || ''} onChange={e=>Api.updateUser(user.id, { emergencyPhone: e.target.value })} placeholder="Phone" className="w-full border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
              </div>
              <div>
                <label className="text-xs font-bold text-gray-500 block mb-1">Address</label>
                <input value={user.address || ''} onChange={e=>Api.updateUser(user.id, { address: e.target.value })} placeholder="Address" className="w-full border rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
              </div>
            </div>
            <button onClick={()=>{if(confirm('Delete account?')) Api.deleteProfile(user.id).then(onLogout);}} className="w-full bg-red-50 border border-red-200 text-red-600 py-3 rounded-2xl font-bold text-sm">Delete Account</button>
          </div>
        )}
      </main>

      {/* Bottom Nav */}
      <nav className="fixed bottom-0 left-0 right-0 bg-white border-t flex items-end justify-around pb-safe pt-2 z-50">
        <button onClick={()=>setTab('home')} className={`flex flex-col items-center pb-1 px-4 ${tab==='home'?'text-blue-600':'text-gray-400'}`}>
          <Ic n="home" s={22}/><span className="text-[10px] font-bold mt-0.5">Home</span>
        </button>
        <div className="mb-3">
          <button onClick={()=>{setScanState('idle'); setScanMsg(''); setTab('scan');}}
            className="w-16 h-16 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-xl flex items-center justify-center active:scale-95 transition-transform">
            <Ic n="camera" s={26}/>
          </button>
        </div>
        <button onClick={()=>setTab('leave')} className={`flex flex-col items-center pb-1 px-4 ${tab==='leave'?'text-blue-600':'text-gray-400'}`}>
          <Ic n="calendar" s={22}/><span className="text-[10px] font-bold mt-0.5">Leave</span>
        </button>
        <button onClick={()=>setTab('settings')} className={`flex flex-col items-center pb-1 px-4 ${tab==='settings'?'text-blue-600':'text-gray-400'}`}>
          <Ic n="settings" s={22}/><span className="text-[10px] font-bold mt-0.5">Settings</span>
        </button>
      </nav>

      {selRec && <PhotoModal record={selRec} onClose={()=>setSelRec(null)}/>}
    </div>
  );
};

// ---------- ADMIN DASHBOARD ----------
const AdminDashboard = ({ user, config, setConfig, onLogout, toast }) => {
  const [tab, setTab] = useState('overview');
  const [att, setAtt] = useState([]);
  const [users, setUsers] = useState([]);
  const [stats, setStats] = useState(null);
  const [selRec, setSelRec] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [localCfg, setLocalCfg] = useState(config || {});
  const [savingCfg, setSavingCfg] = useState(false);
  const [search, setSearch] = useState('');
  const [filterDate, setFilterDate] = useState('');
  const [leaves, setLeaves] = useState([]);

  const load = async () => {
    setLoading(true);
    try {
      const [a, u, s, l] = await Promise.all([
        Api.getAttendanceRecords(),
        Api.getUsers(),
        Api.getDashboardStats(),
        Api.getLeaveRequests()
      ]);
      setAtt(a); setUsers(u); setStats(s); setLeaves(l);
    } catch(e) { toast(e.message, 'error'); }
    setLoading(false);
  };
  useEffect(()=>{ load(); }, []);
  useEffect(()=>{ if(config) setLocalCfg(config); }, [config]);

  const saveCfg = async () => {
    setSavingCfg(true);
    try { await Api.updateConfig(localCfg); setConfig(localCfg); toast('Config saved!','success'); } catch(e) { toast(e.message,'error'); }
    setSavingCfg(false);
  };
  const useCurrentLoc = async () => {
    try { const p = await getPos(); setLocalCfg(c=>({...c, latitude:p.coords.latitude, longitude:p.coords.longitude})); toast('Location set!','success'); } catch(e) { toast(e.message,'error'); }
  };

  const filteredAtt = att.filter(r => {
    const matchSearch = !search || r.userName?.toLowerCase().includes(search.toLowerCase());
    const matchDate = !filterDate || r.date === filterDate;
    return matchSearch && matchDate;
  });

  const deleteRec = async (id) => {
    if (!confirm('Delete?')) return;
    try { await Api.deleteAttendanceRecord(id); setAtt(a=>a.filter(r=>r.id!==id)); toast('Deleted','success'); } catch(e) { toast(e.message,'error'); }
  };

  const handleLeaveAction = async (leaveId, action) => {
    try {
      if (action === 'approve') await Api.approveLeave(leaveId, user.id);
      else await Api.rejectLeave(leaveId);
      toast('Leave ' + action + 'ed!', 'success');
      load();
    } catch(e) { toast(e.message, 'error'); }
  };

  return (
    <div className="flex flex-col min-h-screen">
      <header className="bg-white border-b sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center"><Ic n="shield" s={16} c="text-white"/></div>
          <span className="font-bold">GeoFace<span className="text-blue-600">Guard</span> <span className="text-xs text-gray-400 font-normal">Admin</span></span>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={load} className="text-gray-400 hover:text-blue-600"><Ic n="refresh" s={18}/></button>
          <button onClick={onLogout} className="text-gray-400 hover:text-red-500"><Ic n="logout" s={18}/></button>
        </div>
      </header>

      <div className="bg-white border-b px-4 flex gap-1 sticky top-[56px] z-30 overflow-x-auto no-scrollbar">
        {[
          {id:'overview', label:'Overview', icon:'bar'},
          {id:'users', label:'Users', icon:'users'},
          {id:'attendance', label:'Attendance', icon:'clock'},
          {id:'leaves', label:'Leaves', icon:'calendar'},
          {id:'settings', label:'Settings', icon:'settings'}
        ].map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex items-center gap-1.5 px-4 py-3 text-sm font-semibold border-b-2 transition-colors whitespace-nowrap ${tab===t.id?'border-blue-600 text-blue-600':'border-transparent text-gray-500 hover:text-gray-700'}`}>
            <Ic n={t.icon} s={15}/>{t.label}
          </button>
        ))}
      </div>

      <main className="flex-1 overflow-y-auto p-4 max-w-2xl mx-auto w-full">
        {/* OVERVIEW */}
        {tab === 'overview' && (
          <div className="space-y-4 animate-fade-in">
            {stats && (
              <>
                <div className="grid grid-cols-3 gap-3">
                  <div className="bg-blue-600 rounded-2xl p-4 text-white text-center"><div className="text-2xl font-bold">{stats.totalWorkers}</div><div className="text-xs text-blue-200 font-semibold">Workers</div></div>
                  <div className="bg-green-600 rounded-2xl p-4 text-white text-center"><div className="text-2xl font-bold">{stats.presentToday}</div><div className="text-xs text-green-200 font-semibold">Present Today</div></div>
                  <div className="bg-purple-600 rounded-2xl p-4 text-white text-center"><div className="text-sm font-bold">{stats.attendancePercent || 0}%</div><div className="text-xs text-purple-200 font-semibold">Attendance %</div></div>
                </div>
                <div className="grid grid-cols-3 gap-3">
                  <div className="bg-yellow-50 rounded-2xl p-4 text-center"><div className="text-xl font-bold text-yellow-600">{stats.absentToday || 0}</div><div className="text-xs text-gray-500">Absent</div></div>
                  <div className="bg-orange-50 rounded-2xl p-4 text-center"><div className="text-xl font-bold text-orange-600">{stats.pendingLeaves || 0}</div><div className="text-xs text-gray-500">Pending Leaves</div></div>
                  <div className="bg-indigo-50 rounded-2xl p-4 text-center"><div className="text-xl font-bold text-indigo-600">{stats.totalAttendance || 0}</div><div className="text-xs text-gray-500">Total Records</div></div>
                </div>
              </>
            )}
            <div className="bg-white rounded-2xl border p-4">
              <h3 className="font-bold text-gray-700 text-sm mb-2">Quick Actions</h3>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={()=>setTab('users')} className="bg-blue-50 text-blue-600 py-2 rounded-xl text-sm font-semibold">Manage Users</button>
                <button onClick={()=>setTab('leaves')} className="bg-yellow-50 text-yellow-600 py-2 rounded-xl text-sm font-semibold">Leave Requests</button>
                <button onClick={()=>setTab('attendance')} className="bg-green-50 text-green-600 py-2 rounded-xl text-sm font-semibold">View Attendance</button>
                <button onClick={()=>setTab('settings')} className="bg-purple-50 text-purple-600 py-2 rounded-xl text-sm font-semibold">Settings</button>
              </div>
            </div>
          </div>
        )}

        {/* USERS */}
        {tab === 'users' && (
          <div className="space-y-4 animate-fade-in">
            <div className="flex justify-between items-center">
              <h3 className="font-bold text-gray-800">Team ({users.length})</h3>
              <button onClick={()=>setShowAdd(true)} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-1.5"><Ic n="plus" s={16}/> Add User</button>
            </div>
            <div className="bg-white rounded-2xl border overflow-hidden">
              {loading ? <div className="flex justify-center py-8"><Spin s={32}/></div> : (
                <div className="divide-y">
                  {users.map(u => (
                    <div key={u.id} className="flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                      <div className="flex items-center gap-3 min-w-0">
                        <img src={u.photoUrl||`https://ui-avatars.com/api/?name=${u.name}`} className="w-10 h-10 rounded-xl object-cover shrink-0"/>
                        <div className="min-w-0">
                          <div className="font-semibold text-sm text-gray-800 truncate">{u.name}</div>
                          <div className="text-xs text-gray-400 truncate">{u.email}</div>
                          <div className="flex gap-1 mt-0.5">
                            <span className={`text-[10px] font-bold px-1.5 rounded-full ${u.role==='ADMIN'?'bg-purple-100 text-purple-600':'bg-blue-100 text-blue-600'}`}>{u.role}</span>
                            {!u.isActive && <span className="text-[10px] font-bold px-1.5 rounded-full bg-red-100 text-red-600">INACTIVE</span>}
                          </div>
                        </div>
                      </div>
                      {u.role !== 'ADMIN' && (
                        <div className="flex gap-1 shrink-0">
                          <button onClick={async()=>{await Api.toggleUserApproval(u.id); load();}} className={`text-xs font-bold px-2 py-1 rounded-lg ${u.isApproved?'bg-orange-50 text-orange-600':'bg-green-50 text-green-600'}`}>
                            {u.isApproved?'Revoke':'Approve'}
                          </button>
                          <button onClick={async()=>{await Api.toggleUserActive(u.id); load();}} className={`text-xs font-bold px-2 py-1 rounded-lg ${u.isActive?'bg-red-50 text-red-500':'bg-gray-100 text-gray-600'}`}>
                            {u.isActive?'Block':'Unblock'}
                          </button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ATTENDANCE */}
        {tab === 'attendance' && (
          <div className="space-y-4 animate-fade-in">
            <div className="flex gap-2">
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name..." className="flex-1 border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
              <input type="date" value={filterDate} onChange={e=>setFilterDate(e.target.value)} className="border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
            <div className="bg-white rounded-2xl border overflow-hidden">
              <div className="px-4 py-3 border-b font-bold text-gray-700 text-sm flex items-center justify-between">
                <span>Records ({filteredAtt.length})</span>
                {filterDate && <button onClick={()=>setFilterDate('')} className="text-blue-600 text-xs">Clear</button>}
              </div>
              {loading ? <div className="flex justify-center py-8"><Spin s={32}/></div> : filteredAtt.length === 0 ? <div className="text-center py-8 text-gray-400 text-sm">No records</div> : (
                <div className="divide-y max-h-[500px] overflow-y-auto no-scrollbar">
                  {filteredAtt.map(r => (
                    <div key={r.id} className="flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                      <div className="flex items-center gap-3 min-w-0">
                        <img src={r.userPhoto||`https://ui-avatars.com/api/?name=${r.userName}`} className="w-10 h-10 rounded-xl object-cover shrink-0" onError={e=>e.target.src='https://ui-avatars.com/api/?name=?'}/>
                        <div className="min-w-0">
                          <div className="font-semibold text-sm text-gray-800 truncate">{r.userName}</div>
                          <div className="text-xs text-gray-400">{r.date} {r.checkInTime}</div>
                          <div className="text-xs text-gray-400">{Math.round(r.distanceFromCenter)}m</div>
                        </div>
                      </div>
                      <div className="flex items-center gap-2 shrink-0">
                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${r.geoStatus==='INSIDE'?'bg-green-100 text-green-700':'bg-red-100 text-red-600'}`}>{r.status}</span>
                        <button onClick={()=>setSelRec(r)} className="text-gray-400 hover:text-blue-600 p-1"><Ic n="photo" s={16}/></button>
                        <button onClick={()=>deleteRec(r.id)} className="text-gray-400 hover:text-red-500 p-1"><Ic n="trash" s={16}/></button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* LEAVES */}
        {tab === 'leaves' && (
          <div className="space-y-4 animate-fade-in">
            <h3 className="font-bold text-gray-800">Leave Requests</h3>
            <div className="bg-white rounded-2xl border overflow-hidden">
              {loading ? <div className="flex justify-center py-8"><Spin s={32}/></div> : leaves.length === 0 ? <div className="text-center py-8 text-gray-400 text-sm">No leave requests</div> : (
                <div className="divide-y">
                  {leaves.map(l => (
                    <div key={l.id} className="px-4 py-3">
                      <div className="flex justify-between items-start">
                        <div>
                          <div className="font-semibold text-sm">{l.userName}</div>
                          <div className="text-xs text-gray-500">{l.fromDate} to {l.toDate}</div>
                          <div className="text-xs text-gray-400">{l.reason}</div>
                        </div>
                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${l.status==='APPROVED'?'bg-green-100 text-green-700':l.status==='REJECTED'?'bg-red-100 text-red-600':'bg-yellow-100 text-yellow-700'}`}>{l.status}</span>
                      </div>
                      {l.status === 'PENDING' && (
                        <div className="flex gap-2 mt-2">
                          <button onClick={()=>handleLeaveAction(l.id, 'approve')} className="bg-green-600 text-white px-4 py-1 rounded-lg text-xs font-bold">Approve</button>
                          <button onClick={()=>handleLeaveAction(l.id, 'reject')} className="bg-red-600 text-white px-4 py-1 rounded-lg text-xs font-bold">Reject</button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* SETTINGS */}
        {tab === 'settings' && (
          <div className="space-y-4 animate-fade-in">
            <div className="bg-white rounded-2xl border p-5 space-y-4">
              <h3 className="font-bold text-gray-800 flex items-center gap-2"><Ic n="map" s={18} c="text-blue-600"/> Geo-Fence Settings</h3>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="text-xs font-bold text-gray-500 block mb-1">LATITUDE</label><input type="number" step="any" value={localCfg.latitude||''} onChange={e=>setLocalCfg(c=>({...c,latitude:parseFloat(e.target.value)||0}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/></div>
                <div><label className="text-xs font-bold text-gray-500 block mb-1">LONGITUDE</label><input type="number" step="any" value={localCfg.longitude||''} onChange={e=>setLocalCfg(c=>({...c,longitude:parseFloat(e.target.value)||0}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/></div>
              </div>
              <button onClick={useCurrentLoc} className="w-full bg-blue-50 text-blue-600 py-2 rounded-xl font-semibold text-sm flex items-center justify-center gap-2"><Ic n="map" s={16}/> Current Location Use Karo</button>
              <div><label className="text-xs font-bold text-gray-500 block mb-1">RADIUS (Meters)</label><input type="number" value={localCfg.radius||''} onChange={e=>setLocalCfg(c=>({...c,radius:parseInt(e.target.value)||100}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/></div>
              <div className="grid grid-cols-3 gap-3">
                <div><label className="text-xs font-bold text-gray-500 block mb-1">START</label><input type="number" step="0.5" min="0" max="23" value={localCfg.attendanceStart||0} onChange={e=>setLocalCfg(c=>({...c,attendanceStart:parseFloat(e.target.value)||0}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/></div>
                <div><label className="text-xs font-bold text-gray-500 block mb-1">END</label><input type="number" step="0.5" min="0" max="23" value={localCfg.attendanceEnd||18} onChange={e=>setLocalCfg(c=>({...c,attendanceEnd:parseFloat(e.target.value)||18}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/></div>
                <div><label className="text-xs font-bold text-gray-500 block mb-1">LATE AFTER</label><input type="number" step="0.5" min="0" max="23" value={localCfg.lateAfter||9.5} onChange={e=>setLocalCfg(c=>({...c,lateAfter:parseFloat(e.target.value)||9.5}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/></div>
              </div>
              <div><label className="text-xs font-bold text-gray-500 block mb-1">OFFICE NAME</label><input value={localCfg.officeName||''} onChange={e=>setLocalCfg(c=>({...c,officeName:e.target.value}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/></div>
              <div><label className="text-xs font-bold text-gray-500 block mb-1">OFFICE ADDRESS</label><input value={localCfg.officeAddress||''} onChange={e=>setLocalCfg(c=>({...c,officeAddress:e.target.value}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/></div>
              <div><label className="text-xs font-bold text-gray-500 block mb-1">WORKING HOURS/DAY</label><input type="number" value={localCfg.workingHoursPerDay||8} onChange={e=>setLocalCfg(c=>({...c,workingHoursPerDay:parseFloat(e.target.value)||8}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/></div>
              <button onClick={saveCfg} disabled={savingCfg} className="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2">
                {savingCfg ? <Spin s={20}/> : 'Save Configuration'}
              </button>
            </div>
          </div>
        )}
      </main>

      {showAdd && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 animate-fade-in">
          <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden">
            <div className="px-5 py-4 border-b flex items-center justify-between"><h3 className="font-bold text-gray-800">Add User</h3><button onClick={()=>setShowAdd(false)}><Ic n="x" s={20} c="text-gray-400"/></button></div>
            <AddUserForm onDone={()=>{setShowAdd(false); load(); toast('User created!','success');}} onError={e=>toast(e,'error')}/>
          </div>
        </div>
      )}
      {selRec && <PhotoModal record={selRec} onClose={()=>setSelRec(null)} isAdmin/>}
    </div>
  );
};

const AddUserForm = ({ onDone, onError }) => {
  const [form, setForm] = useState({name:'', email:'', mobile:'', role:'WORKER', department:'', designation:''});
  const [loading, setLoading] = useState(false);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const submit = async (e) => {
    e.preventDefault(); setLoading(true);
    try { await Api.createUser(form); onDone(); } catch(err) { onError(err.message||'Error'); }
    setLoading(false);
  };
  const inp = "w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500";
  return (
    <form onSubmit={submit} className="p-5 space-y-3">
      <input required value={form.name} onChange={set('name')} placeholder="Full Name" className={inp}/>
      <input required type="email" value={form.email} onChange={set('email')} placeholder="Email" className={inp}/>
      <input type="tel" value={form.mobile} onChange={set('mobile')} placeholder="Mobile" className={inp}/>
      <input value={form.department} onChange={set('department')} placeholder="Department" className={inp}/>
      <input value={form.designation} onChange={set('designation')} placeholder="Designation" className={inp}/>
      <select value={form.role} onChange={set('role')} className={inp}>
        <option value="WORKER">Worker</option>
        <option value="ADMIN">Admin</option>
      </select>
      <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold flex items-center justify-center gap-2">
        {loading ? <Spin s={18}/> : 'Create User'}
      </button>
    </form>
  );
};

// ---------- REGISTER ----------
const RegisterView = ({ onBack, toast }) => {
  const [form, setForm] = useState({name:'', email:'', mobile:'', role:'WORKER', department:'', designation:''});
  const [loading, setLoading] = useState(false);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const inp = "w-full border rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50";
  const submit = async (e) => {
    e.preventDefault(); setLoading(true);
    try {
      await Api.register(form.name, form.email, form.mobile, form.role, form.department, form.designation);
      toast('Registered! Admin approval ka wait karo.','success');
      onBack();
    } catch(err) { toast(err.message||'Error','error'); }
    setLoading(false);
  };
  return (
    <div className="space-y-4 animate-fade-in">
      <button onClick={onBack} className="text-blue-600 text-sm font-semibold flex items-center gap-1">← Back</button>
      <h2 className="text-2xl font-bold text-gray-800">Register</h2>
      <form onSubmit={submit} className="space-y-3">
        <input required value={form.name} onChange={set('name')} placeholder="Full Name" className={inp}/>
        <input required type="email" value={form.email} onChange={set('email')} placeholder="Email" className={inp}/>
        <input type="tel" value={form.mobile} onChange={set('mobile')} placeholder="Mobile" className={inp}/>
        <input value={form.department} onChange={set('department')} placeholder="Department" className={inp}/>
        <input value={form.designation} onChange={set('designation')} placeholder="Designation" className={inp}/>
        <select value={form.role} onChange={set('role')} className={inp}>
          <option value="WORKER">Worker</option>
          <option value="ADMIN">Admin</option>
        </select>
        <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2">
          {loading ? <Spin s={20}/> : 'Register'}
        </button>
      </form>
    </div>
  );
};

// ---------- APP ----------
const App = () => {
  const [user, setUser] = useState(null);
  const [config, setConfig] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('login');
  const [toast, setToast] = useState(null);
  const [loginEmail, setLoginEmail] = useState('');
  const [loginLoading, setLoginLoading] = useState(false);
  const showToast = (msg, type='info') => setToast({msg, type, id: Date.now()});

  useEffect(() => {
    (async () => {
      try {
        const cfg = await Api.getConfig();
        setConfig(cfg);
        const stored = localStorage.getItem(SESSION_KEY);
        if (stored) {
          const u = JSON.parse(stored);
          // Verify user still exists
          try { await Api.login(u.email); setUser(u); } catch(e) { localStorage.removeItem(SESSION_KEY); }
        }
      } catch(e) {}
      setLoading(false);
    })();
  }, []);

  const login = async (e) => {
    e.preventDefault(); setLoginLoading(true);
    try {
      const u = await Api.login(loginEmail);
      setUser(u);
      localStorage.setItem(SESSION_KEY, JSON.stringify(u));
    } catch(err) { showToast(err.message || 'Login failed', 'error'); }
    setLoginLoading(false);
  };
  const logout = () => { setUser(null); localStorage.removeItem(SESSION_KEY); };

  if (loading) return <div className="min-h-screen flex items-center justify-center"><Spin s={32}/></div>;

  if (!user) return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50 p-4">
      <div className="bg-white rounded-3xl shadow-xl w-full max-w-sm p-8 space-y-6">
        <div className="text-center">
          <div className="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-3"><Ic n="shield" s={32} c="text-white"/></div>
          <h1 className="text-2xl font-extrabold text-gray-900">GeoFace<span className="text-blue-600">Guard</span></h1>
          <p className="text-gray-500 text-sm mt-1">Professional Attendance System</p>
        </div>

        {view === 'login' ? (
          <form onSubmit={login} className="space-y-3">
            <input type="email" required value={loginEmail} onChange={e=>setLoginEmail(e.target.value)} placeholder="Email" className="w-full border rounded-2xl p-3.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"/>
            <button type="submit" disabled={loginLoading} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors">
              {loginLoading ? <Spin s={20}/> : 'Sign In'}
            </button>
            <button type="button" onClick={()=>setView('register')} className="w-full text-blue-600 py-2 font-semibold text-sm">New user? Register</button>
          </form>
        ) : <RegisterView onBack={()=>setView('login')} toast={showToast}/>}
        {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
      </div>
    </div>
  );

  return (
    <>
      {user.role === 'ADMIN'
        ? <AdminDashboard user={user} config={config} setConfig={setConfig} onLogout={logout} toast={showToast}/>
        : <WorkerPortal user={user} config={config} onLogout={logout} toast={showToast}/>
      }
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
