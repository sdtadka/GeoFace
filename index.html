  { id: '2', name: 'Rahul Worker', email: 'rahul@worker.com', role: 'WORKER', isApproved: true, isActive: true, mobile: '9876543210', photoUrl: 'https://ui-avatars.com/api/?name=Rahul+W&background=059669&color=fff' },
];
let MOCK_ATT = [];
let MOCK_CFG = { latitude: 28.6139, longitude: 77.2090, radius: 10000, officeName: 'Demo Office', attendanceStart: 0, attendanceEnd: 24, lateAfter: 600 };

const MockService = {
  login: async (email) => {
    const u = MOCK_USERS.find(x => x.email === email);
    if (!u) throw new Error('User not found (Demo Mode)');
    if (!u.isActive) throw new Error('Account deactivated');
    if (!u.isApproved) throw new Error('Pending approval');
    return u;
  },
  register: async (name, email, role) => {
    if (MOCK_USERS.find(u => u.email === email)) throw new Error('Email exists');
    MOCK_USERS.push({ id: Date.now().toString(), name, email, role, isApproved: role==='ADMIN', isActive:true, mobile:'', photoUrl:`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random` });
    return true;
  },
  createUser: async (d) => {
    if (MOCK_USERS.find(u => u.email === d.email)) throw new Error('Email exists');
    const u = { id: Date.now().toString(), ...d, isApproved: true, isActive: true, photoUrl:`https://ui-avatars.com/api/?name=${encodeURIComponent(d.name)}&background=random` };
    MOCK_USERS.push(u); return u;
  },
  getConfig: async () => ({ ...MOCK_CFG }),
  updateConfig: async (c) => { MOCK_CFG = { ...MOCK_CFG, ...c }; return true; },
  markAttendance: async (d) => {
    const isInside = d.distanceFromCenter <= MOCK_CFG.radius;
    const u = MOCK_USERS.find(x => x.id === d.userId);
    const rec = { ...d, id: Date.now().toString(), userName: u?.name||'?', userPhoto: u?.photoUrl||'', status: isInside ? (d.status||'PRESENT') : 'REJECTED', geoStatus: isInside?'INSIDE':'OUTSIDE', timestamp: new Date().toISOString() };
    MOCK_ATT.unshift(rec); return rec;
  },
  getAttendanceRecords: async () => [...MOCK_ATT],
  getUsers: async () => [...MOCK_USERS],
  toggleUserApproval: async (uid) => { const u = MOCK_USERS.find(x=>x.id===uid); if(u) u.isApproved=!u.isApproved; return true; },
  toggleUserActive: async (uid) => { const u = MOCK_USERS.find(x=>x.id===uid); if(u) u.isActive=!u.isActive; return true; },
  getWorkerHistory: async (uid) => MOCK_ATT.filter(r=>r.userId===uid),
  getWorkerStats: async (uid) => {
    const h = MOCK_ATT.filter(r=>r.userId===uid);
    const now = new Date();
    const month = h.filter(r => { const d=new Date(r.timestamp); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
    const p=month.filter(r=>r.status==='PRESENT').length, l=month.filter(r=>r.status==='LATE').length;
    return { present:p, late:l, absent:Math.max(0,now.getDate()-p-l), totalDays:now.getDate(), careerPresent:h.filter(r=>r.status==='PRESENT'||r.status==='LATE').length, careerAbsent:h.filter(r=>r.status==='REJECTED').length };
  },
  updateProfilePicture: async (uid, img) => { const u=MOCK_USERS.find(x=>x.id===uid); if(u) u.photoUrl=img; return img; },
  updateUserInfo: async (uid, mobile) => { const u=MOCK_USERS.find(x=>x.id===uid); if(u) u.mobile=mobile; return u; },
  deleteProfile: async (uid) => { const u=MOCK_USERS.find(x=>x.id===uid); if(u) u.isActive=false; return true; },
  getDashboardStats: async () => {
    const today = new Date().toDateString();
    const todayAtt = MOCK_ATT.filter(r => new Date(r.timestamp).toDateString()===today&&(r.status==='PRESENT'||r.status==='LATE'));
    return { totalWorkers: MOCK_USERS.filter(u=>u.role==='WORKER').length, presentToday: todayAtt.length, avgTime: '--' };
  },
  deleteAttendanceRecord: async (id) => { const i=MOCK_ATT.findIndex(r=>r.id===id); if(i>-1){MOCK_ATT.splice(i,1); return true;} return false; }
};

// Real GAS HTTP call
async function callGAS(fn, args=[]) {
  const url = localStorage.getItem(GAS_URL_KEY);
  if (!url) {
    // No URL set — use mock
    if (MockService[fn]) return MockService[fn](...args);
    throw new Error('Function not in mock: ' + fn);
  }
  const resp = await fetch(url, {
    method: 'POST',
    body: JSON.stringify({ fn, args }),
    headers: { 'Content-Type': 'text/plain' }
  });
  const json = await resp.json();
  if (!json.ok) throw new Error(json.error || 'GAS Error');
  return json.data;
}

const Api = {
  login: (email) => callGAS('login', [email]),
  register: (name, email, role) => callGAS('register', [name, email, role]),
  createUser: (d) => callGAS('createUser', [d]),
  getConfig: () => callGAS('getConfig'),
  updateConfig: (c) => callGAS('updateConfig', [c]),
  markAttendance: (d) => callGAS('markAttendance', [d]),
  getAttendanceRecords: () => callGAS('getAttendanceRecords'),
  getUsers: () => callGAS('getUsers'),
  toggleUserApproval: (uid) => callGAS('toggleUserApproval', [uid]),
  toggleUserActive: (uid) => callGAS('toggleUserActive', [uid]),
  getWorkerHistory: (uid) => callGAS('getWorkerHistory', [uid]),
  getWorkerStats: (uid) => callGAS('getWorkerStats', [uid]),
  updateProfilePicture: (uid, img) => callGAS('updateProfilePicture', [uid, img]),
  updateUserInfo: (uid, mobile) => callGAS('updateUserInfo', [uid, mobile]),
  deleteProfile: (uid) => callGAS('deleteProfile', [uid]),
  getDashboardStats: () => callGAS('getDashboardStats'),
  deleteAttendanceRecord: (id) => callGAS('deleteAttendanceRecord', [id]),
};

const calcDist = (lat1,lon1,lat2,lon2) => {
  const R=6371e3, p=Math.PI/180;
  const a = 0.5-Math.cos((lat2-lat1)*p)/2+Math.cos(lat1*p)*Math.cos(lat2*p)*(1-Math.cos((lon2-lon1)*p))/2;
  return 2*R*Math.asin(Math.sqrt(a));
};
const getPos = () => new Promise((res,rej) => navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true,timeout:10000,maximumAge:0}));

// Toast
const Toast = ({ msg, type, onDone }) => {
  useEffect(() => { const t = setTimeout(onDone, 3000); return ()=>clearTimeout(t); }, []);
  const colors = { success: 'bg-emerald-600', error: 'bg-red-600', info: 'bg-blue-600' };

// Camera + Face Detection
const FaceCamera = ({ onCapture, scanning }) => {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const [hasFace, setHasFace] = useState(false);
  const [facing, setFacing] = useState('user');
  const [mirrored, setMirrored] = useState(true);
  const streamRef = useRef(null);

  const startCam = useCallback(async () => {
    if (streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facing, width:640, height:480 } });
      streamRef.current = s;
      if (videoRef.current) { videoRef.current.srcObject = s; }
    } catch(e) { alert('Camera error: ' + e.message); }
  }, [facing]);

  useEffect(() => {
    setMirrored(facing === 'user');
    startCam();
    return () => { if (streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); };
  }, [facing]);

  useEffect(() => {
    if (!window.FaceMesh) return;
    const fm = new window.FaceMesh({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
    fm.setOptions({ maxNumFaces: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    fm.onResults(r => setHasFace(r.multiFaceLandmarks?.length > 0));

    let cam;
    const v = videoRef.current;
    if (v) {
      cam = new window.Camera(v, {
        onFrame: async () => { try { await fm.send({image: v}); } catch(e){} },
        width: 640, height: 480
      });
      cam.start();
    }
    return () => { try { cam?.stop(); fm.close(); } catch(e){} };
  }, []);

  const capture = () => {
    const cv = canvasRef.current, ctx = cv.getContext('2d');
    const {width:w, height:h} = cv;
    ctx.clearRect(0,0,w,h);
    ctx.save();
    if (mirrored) { ctx.translate(w,0); ctx.scale(-1,1); }
    ctx.drawImage(videoRef.current,0,0,w,h);
    ctx.restore();
    onCapture(cv.toDataURL('image/jpeg', 0.85));
  };

  return (
    <div className="relative w-full max-w-sm mx-auto rounded-3xl overflow-hidden shadow-2xl bg-black">
      <video ref={videoRef} autoPlay playsInline muted
        className={`w-full h-72 object-cover ${mirrored ? 'scale-x-[-1]' : ''}`}
        style={{background:'#000'}}
      />
      <canvas ref={canvasRef} className="hidden" width={640} height={480}/>

      {/* Face outline oval */}
      <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-52 face-outline pointer-events-none ${hasFace?'face-detected':''}`}/>

      {/* Scan line */}
      {hasFace && !scanning && (
        <div className="absolute left-0 right-0 h-0.5 bg-green-400/60 scan-line pointer-events-none" style={{top:0}}/>
      )}

      {/* Status */}
      <div className={`absolute top-3 left-3 right-3 flex justify-center`}>
        <span className={`px-3 py-1 rounded-full text-xs font-bold ${hasFace?'bg-green-500 text-white':'bg-black/60 text-white/70'}`}>
          {hasFace ? '✓ Face Detected' : 'Position your face'}
        </span>
      </div>

      {/* Controls */}
      <div className="absolute top-3 right-3 flex flex-col gap-2">
        <button onClick={()=>setFacing(f=>f==='user'?'environment':'user')} className="p-2 bg-black/50 text-white rounded-full hover:bg-black/80">
          <Ic n="refresh" s={18}/>
        </button>
        <button onClick={()=>setMirrored(m=>!m)} className={`p-2 rounded-full text-white ${mirrored?'bg-blue-600':'bg-black/50 hover:bg-black/80'}`}>
          <Ic n="flip" s={18}/>
        </button>
      </div>

      {/* Capture button */}
      <div className="bg-gray-900 py-4 flex justify-center items-center gap-4">
        <button
          onClick={capture}
          disabled={!hasFace || scanning}
          className={`relative w-16 h-16 rounded-full border-4 transition-all ${hasFace&&!scanning ? 'border-white bg-white hover:scale-110 active:scale-95' : 'border-gray-600 bg-gray-600 cursor-not-allowed'}`}
        >
          {scanning && <div className="absolute inset-0 rounded-full border-4 border-blue-500 border-t-transparent animate-spin"/>}
        </button>
      </div>
    </div>
  );
};

// Photo modal with watermark download
const PhotoModal = ({ record, onClose, isAdmin }) => {
  const [loading, setLoading] = useState(false);

  const makeWatermarked = async () => {
    const img = new Image(); img.crossOrigin='anonymous';
    await new Promise((res,rej) => { img.onload=res; img.onerror=rej; img.src=record.imageUrl; });
    const cv = document.createElement('canvas');
    cv.width=img.width||640; cv.height=img.height||480;
    const ctx = cv.getContext('2d');
    ctx.drawImage(img,0,0,cv.width,cv.height);

    // Dark overlay card at bottom
    const cw=cv.width*0.95, ch=110, cx=(cv.width-cw)/2, cy=cv.height-ch-15;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.roundRect(cx,cy,cw,ch,20); ctx.fill();

    // Status badge
    const badge = record.geoStatus==='INSIDE' ? '✓ GEO VERIFIED' : '✗ OUT OF FENCE';
    const bColor = record.geoStatus==='INSIDE' ? '#22c55e' : '#ef4444';
    ctx.fillStyle=bColor; ctx.roundRect(cx+10, cy+10, 130, 28, 8); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 13px Inter,sans-serif'; ctx.textAlign='left';
    ctx.fillText(badge, cx+18, cy+29);

    // Info
    ctx.font='500 14px Inter,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillText(record.userName || 'User', cx+150, cy+28);
    ctx.font='400 12px Inter,sans-serif'; ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.fillText(`Lat: ${parseFloat(record.latitude).toFixed(5)}  Lng: ${parseFloat(record.longitude).toFixed(5)}`, cx+12, cy+58);
    ctx.fillText(new Date(record.timestamp).toLocaleString('en-IN'), cx+12, cy+80);
    ctx.fillText(`Distance: ${Math.round(record.distanceFromCenter)}m`, cx+12, cy+100);

    // Rotate stamp
    if (record.geoStatus==='INSIDE') {
      ctx.save(); ctx.translate(cv.width-70, cv.height-220); ctx.rotate(-20*Math.PI/180);
      ctx.strokeStyle='#16a34a'; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(0,0,45,0,2*Math.PI); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,38,0,2*Math.PI); ctx.stroke();
      ctx.fillStyle='#16a34a'; ctx.textAlign='center'; ctx.font='bold 14px sans-serif';
      ctx.fillText('VERIFIED',0,-5); ctx.font='10px sans-serif'; ctx.fillText('GEOFACE GUARD',0,10);
      ctx.restore();
    }
    return cv.toDataURL('image/jpeg',0.95);
  };

  const download = async () => {
    setLoading(true);
    try {
      const url = await makeWatermarked();
      const a = document.createElement('a'); a.href=url;
      a.download=`Attendance_${record.userName?.replace(/\s/g,'_')}_${new Date(record.timestamp).toLocaleDateString('en-IN').replace(/\//g,'-')}.jpg`;
      a.click();
    } catch(e) { alert('Could not download: ' + e.message); }
    setLoading(false);
  };

  const share = async () => {
    try {
      const url = await makeWatermarked();
      const res = await fetch(url);
      const blob = await res.blob();
      const file = new File([blob], 'Attendance.jpg', {type:'image/jpeg'});
      if (navigator.canShare?.({files:[file]})) {
        await navigator.share({ files:[file], title:'Attendance Proof' });
      } else {
        const link = document.createElement('a'); link.href=url; link.download='Attendance.jpg'; link.click();
      }
    } catch(e) {}
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 p-4 animate-fade-in" onClick={onClose}>

const WorkerPortal = ({ user, config, onLogout, toast }) => {
  const [tab, setTab] = useState('home');
  const [stats, setStats] = useState(null);
  const [history, setHistory] = useState([]);
  const [selRec, setSelRec] = useState(null);
  const [scanState, setScanState] = useState('idle'); // idle checking success error
  const [scanMsg, setScanMsg] = useState('');
  const [loading, setLoading] = useState(true);
  const [mobile, setMobile] = useState(user.mobile || '');
  const [savingMobile, setSavingMobile] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const [s, h] = await Promise.all([Api.getWorkerStats(user.id), Api.getWorkerHistory(user.id)]);
      setStats(s); setHistory(h);
    } catch(e) { toast(e.message, 'error'); }
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const handleCapture = async (imgData) => {
    setScanState('checking');
    try {
      // Check: already marked today?
      const todayStr = new Date().toDateString();
      if (history.some(r => new Date(r.timestamp).toDateString() === todayStr && (r.status==='PRESENT'||r.status==='LATE'))) {
        setScanState('error'); setScanMsg('Aaj ki attendance pehle se mark ho chuki hai!'); return;
      }

      // Check: time window
      const now = new Date();
      const h = now.getHours() + now.getMinutes()/60;
      const start = parseFloat(config.attendanceStart || 0);
      const end = parseFloat(config.attendanceEnd || 24);
      const lateAfter = parseFloat(config.lateAfter || end);
      if (h < start) { setScanState('error'); setScanMsg(`Attendance ${start}:00 baje se shuru hoti hai`); return; }
      if (h > end) { setScanState('error'); setScanMsg(`Attendance ${end}:00 baje band ho gayi`); return; }

      // Geo check
      let pos;
      try { pos = await getPos(); }
      catch(e) { setScanState('error'); setScanMsg('GPS error: ' + e.message); return; }

      const dist = calcDist(pos.coords.latitude, pos.coords.longitude, config.latitude, config.longitude);
      if (dist > config.radius) {
        setScanState('error');
        setScanMsg(`Aap bahut door hain! (${Math.round(dist)}m — limit: ${config.radius}m)`);
        return;
      }

      const status = h >= lateAfter ? 'LATE' : 'PRESENT';
      await Api.markAttendance({
        userId: user.id,
        latitude: pos.coords.latitude,
        longitude: pos.coords.longitude,
        imageUrl: imgData,
        distanceFromCenter: Math.round(dist),
        status,
        timestamp: now.toISOString()
      });
      setScanState('success');
      setScanMsg(status === 'LATE' ? 'Late Attendance Mark Ho Gayi! ⚠️' : 'Attendance Mark Ho Gayi! ✅');
      load();
    } catch(e) {
      setScanState('error'); setScanMsg(e.message || 'Kuch galat hua');
    }
  };

  const saveMobile = async () => {
    setSavingMobile(true);
    try { await Api.updateUserInfo(user.id, mobile); toast('Mobile number saved!', 'success'); }
    catch(e) { toast(e.message, 'error'); }
    setSavingMobile(false);
  };

  const todayRec = history.find(r => new Date(r.timestamp).toDateString() === new Date().toDateString());

  return (
    <div className="flex flex-col min-h-screen">
      {/* Header */}
      <header className="bg-white border-b sticky top-0 z-40 px-4 py-3 flex items-center justify-between">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center">
            <Ic n="shield" s={16} c="text-white"/>
          </div>
          <span className="font-bold text-gray-800">GeoFace<span className="text-blue-600">Guard</span></span>
        </div>
        <button onClick={onLogout} className="text-gray-400 hover:text-red-500 p-1"><Ic n="logout" s={20}/></button>
      </header>

      <main className="flex-1 overflow-y-auto pb-24 px-4 pt-4 max-w-lg mx-auto w-full">
        {/* HOME TAB */}
        {tab === 'home' && (
          <div className="space-y-4 animate-fade-in">
            {/* Profile card */}
            <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl p-5 text-white">
              <div className="flex items-center gap-4">
                <img src={user.photoUrl} className="w-14 h-14 rounded-2xl border-2 border-white/30 object-cover" onError={e=>e.target.src='https://ui-avatars.com/api/?name='+user.name}/>
                <div>
                  <h2 className="text-lg font-bold">{user.name}</h2>
                  <p className="text-blue-200 text-sm">{user.email}</p>
                  <span className="text-xs bg-white/20 px-2 py-0.5 rounded-full">{user.role}</span>
                </div>
              </div>
              {/* Today status */}
              <div className={`mt-4 flex items-center gap-2 text-sm font-semibold px-3 py-2 rounded-xl ${todayRec ? (todayRec.status==='LATE'?'bg-yellow-500/30':'bg-green-500/30') : 'bg-white/10'}`}>
                <Ic n={todayRec ? 'check' : 'clock'} s={16}/>
                {todayRec ? `Aaj ${todayRec.status} — ${new Date(todayRec.timestamp).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}` : 'Aaj attendance nahi maari'}
              </div>
            </div>

            {/* Stats */}
            {loading ? (
              <div className="flex justify-center py-8"><Spin s={32}/></div>
            ) : stats ? (
              <div className="grid grid-cols-3 gap-3">
                {[
                  { label: 'Present', val: stats.present, color: 'text-green-600', bg: 'bg-green-50' },
                  { label: 'Late', val: stats.late, color: 'text-yellow-600', bg: 'bg-yellow-50' },
                  { label: 'Absent', val: stats.absent, color: 'text-red-500', bg: 'bg-red-50' },
                ].map(s => (
                  <div key={s.label} className={`${s.bg} rounded-2xl p-4 text-center`}>
                    <div className={`text-2xl font-bold ${s.color}`}>{s.val}</div>
                    <div className="text-xs text-gray-500 font-semibold mt-1">{s.label}</div>
                  </div>
                ))}
              </div>
            ) : null}

            {/* History */}
            <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
              <div className="px-4 py-3 border-b flex items-center justify-between">
                <h3 className="font-bold text-gray-800 flex items-center gap-2"><Ic n="clock" s={16} c="text-blue-500"/> History</h3>
                <button onClick={load} className="text-gray-400 hover:text-blue-600"><Ic n="refresh" s={16}/></button>
              </div>
              {history.length === 0 ? (
                <div className="text-center py-8 text-gray-400 text-sm">Koi record nahi mila</div>
              ) : (
                <div className="divide-y max-h-72 overflow-y-auto no-scrollbar">
                  {history.slice(0,20).map(r => (
                    <div key={r.id} className="flex items-center justify-between px-4 py-3 hover:bg-gray-50">
                      <div className="flex items-center gap-3">
                        <div className={`w-1.5 h-10 rounded-full ${r.status==='PRESENT'?'bg-green-500':r.status==='LATE'?'bg-yellow-500':'bg-red-500'}`}/>
                        <div>
                          <div className="font-semibold text-sm text-gray-800">{new Date(r.timestamp).toLocaleDateString('en-IN')}</div>
                          <div className="text-xs text-gray-400">{new Date(r.timestamp).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className={`text-xs font-bold px-2 py-0.5 rounded-full ${r.status==='PRESENT'?'bg-green-100 text-green-700':r.status==='LATE'?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-600'}`}>{r.status}</span>
                        <button onClick={()=>setSelRec(r)} className="text-gray-400 hover:text-blue-600"><Ic n="photo" s={16}/></button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* SCAN TAB */}
        {tab === 'scan' && (
          <div className="space-y-4 animate-fade-in">
            <h2 className="text-xl font-bold text-center text-gray-800 pt-2">Attendance Mark Karo</h2>
            {scanState === 'success' ? (
              <div className="bg-green-50 border-2 border-green-200 rounded-3xl p-8 text-center">
                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Ic n="check" s={40} c="text-green-600"/>
                </div>
                <div className="font-bold text-green-800 text-lg">{scanMsg}</div>
                <button onClick={()=>{setScanState('idle'); setTab('home');}} className="mt-6 bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">Back to Home</button>
              </div>
            ) : (
              <>
                <FaceCamera onCapture={handleCapture} scanning={scanState==='checking'}/>
                {scanState === 'checking' && (
                  <div className="bg-blue-50 rounded-2xl p-4 text-center flex items-center justify-center gap-3">
                    <Spin s={20}/> <span className="text-blue-700 font-semibold text-sm">GPS & data save ho raha hai...</span>
                  </div>

        {/* SETTINGS TAB */}
        {tab === 'settings' && (
          <div className="space-y-4 animate-fade-in">
            <div className="bg-white rounded-2xl border p-5 space-y-4">
              <h3 className="font-bold text-gray-800">Profile Settings</h3>
              <div className="flex items-center gap-4">
                <img src={user.photoUrl} className="w-16 h-16 rounded-2xl object-cover" onError={e=>e.target.src='https://ui-avatars.com/api/?name='+user.name}/>

            <button onClick={()=>{if(confirm('Account delete karna chahte ho?')) Api.deleteProfile(user.id).then(onLogout);}} 
              className="w-full bg-red-50 border border-red-200 text-red-600 py-3 rounded-2xl font-bold text-sm">

      {/* Bottom Nav */}

                      {u.role !== 'ADMIN' && (
                        <div className="flex gap-1 shrink-0">
                          <button onClick={async()=>{await Api.toggleUserApproval(u.id); load();}} className={`text-xs font-bold px-2 py-1 rounded-lg ${u.isApproved?'bg-orange-50 text-orange-600':'bg-green-50 text-green-600'}`}>
                            {u.isApproved?'Revoke':'Approve'}
                          </button>
                          <button onClick={async()=>{await Api.toggleUserActive(u.id); load();}} className={`text-xs font-bold px-2 py-1 rounded-lg ${u.isActive?'bg-red-50 text-red-500':'bg-gray-100 text-gray-600'}`}>
                            {u.isActive?'Block':'Unblock'}
                          </button>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* SETTINGS */}
        {tab === 'settings' && (
          <div className="space-y-4 animate-fade-in">
            {/* GAS URL Setup */}
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 space-y-3">
              <h3 className="font-bold text-amber-800 flex items-center gap-2"><Ic n="key" s={18}/> Google Apps Script Setup</h3>
              <p className="text-xs text-amber-700">Deploy karne ke baad apna Web App URL yahan daalo. Blank rehne par Demo Mode mein kaam karega.</p>
              <input
                defaultValue={localStorage.getItem(GAS_URL_KEY)||''}
                placeholder="https://script.google.com/macros/s/..."
                className="w-full border border-amber-300 rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-amber-500 bg-white"
                id="gasUrlInput"
              />
              <button onClick={()=>{
                const v = document.getElementById('gasUrlInput').value.trim();
                if(v) { localStorage.setItem(GAS_URL_KEY, v); toast('GAS URL saved! Reload karein.','success'); }
                else { localStorage.removeItem(GAS_URL_KEY); toast('Demo mode active ho gaya','info'); }
              }} className="w-full bg-amber-600 text-white py-2 rounded-xl font-bold text-sm">
                Save & Reload
              </button>
            </div>

            {/* Geo-fence config */}
            <div className="bg-white rounded-2xl border p-5 space-y-4">
              <h3 className="font-bold text-gray-800 flex items-center gap-2"><Ic n="map" s={18} c="text-blue-600"/> Geo-Fence Settings</h3>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs font-bold text-gray-500 block mb-1">LATITUDE</label>
                  <input type="number" step="any" value={localCfg.latitude||''} onChange={e=>setLocalCfg(c=>({...c,latitude:parseFloat(e.target.value)||0}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="text-xs font-bold text-gray-500 block mb-1">LONGITUDE</label>
                  <input type="number" step="any" value={localCfg.longitude||''} onChange={e=>setLocalCfg(c=>({...c,longitude:parseFloat(e.target.value)||0}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
              </div>
              <button onClick={useCurrentLoc} className="w-full bg-blue-50 text-blue-600 py-2 rounded-xl font-semibold text-sm flex items-center justify-center gap-2">
                <Ic n="map" s={16}/> Current Location Use Karo
              </button>
              <div>
                <label className="text-xs font-bold text-gray-500 block mb-1">RADIUS (Meters)</label>
                <input type="number" value={localCfg.radius||''} onChange={e=>setLocalCfg(c=>({...c,radius:parseInt(e.target.value)||100}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
              </div>
              <div className="grid grid-cols-3 gap-3">
                <div>
                  <label className="text-xs font-bold text-gray-500 block mb-1">START (Hour)</label>
                  <input type="number" min="0" max="23" value={localCfg.attendanceStart||0} onChange={e=>setLocalCfg(c=>({...c,attendanceStart:parseInt(e.target.value)||0}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="text-xs font-bold text-gray-500 block mb-1">END (Hour)</label>
                  <input type="number" min="0" max="23" value={localCfg.attendanceEnd||24} onChange={e=>setLocalCfg(c=>({...c,attendanceEnd:parseInt(e.target.value)||24}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                  <label className="text-xs font-bold text-gray-500 block mb-1">LATE AFTER</label>
                  <input type="number" min="0" max="23" value={localCfg.lateAfter||10} onChange={e=>setLocalCfg(c=>({...c,lateAfter:parseInt(e.target.value)||10}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
              </div>
              <div>
                <label className="text-xs font-bold text-gray-500 block mb-1">OFFICE NAME</label>
                <input value={localCfg.officeName||''} onChange={e=>setLocalCfg(c=>({...c,officeName:e.target.value}))} className="w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500"/>
              </div>
              <button onClick={saveCfg} disabled={savingCfg} className="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2">
                {savingCfg ? <Spin s={20}/> : 'Save Configuration'}
              </button>
            </div>
          </div>
        )}
      </main>

      {/* Add User Modal */}
      {showAdd && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 p-4 animate-fade-in">
          <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden">
            <div className="px-5 py-4 border-b flex items-center justify-between">
              <h3 className="font-bold text-gray-800">New User Add Karo</h3>
              <button onClick={()=>setShowAdd(false)}><Ic n="x" s={20} c="text-gray-400"/></button>
            </div>
            <AddUserForm onDone={()=>{setShowAdd(false); load(); toast('User created!','success');}} onError={e=>toast(e,'error')}/>
          </div>
        </div>
      )}

      {selRec && <PhotoModal record={selRec} onClose={()=>setSelRec(null)} isAdmin/>}
    </div>
  );
};

const AddUserForm = ({ onDone, onError }) => {
  const [form, setForm] = useState({name:'', email:'', mobile:'', role:'WORKER'});
  const [loading, setLoading] = useState(false);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const submit = async (e) => {
    e.preventDefault(); setLoading(true);
    try { await Api.createUser(form); onDone(); }
    catch(err) { onError(err.message||'Error'); }
    setLoading(false);
  };
  const inp = "w-full border rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500";
  return (
    <form onSubmit={submit} className="p-5 space-y-3">
      <input required value={form.name} onChange={set('name')} placeholder="Full Name" className={inp}/>
      <input required type="email" value={form.email} onChange={set('email')} placeholder="Email" className={inp}/>
      <input type="tel" value={form.mobile} onChange={set('mobile')} placeholder="Mobile (optional)" className={inp}/>
      <select value={form.role} onChange={set('role')} className={inp}>
        <option value="WORKER">Worker</option>
        <option value="ADMIN">Admin</option>
      </select>
      <div className="flex gap-2 pt-1">
        <button type="submit" disabled={loading} className="flex-1 bg-blue-600 text-white py-2.5 rounded-xl font-bold flex items-center justify-center gap-2">
          {loading ? <Spin s={18}/> : 'Create'}
        </button>
      </div>
    </form>
  );
};

// ============================================================
//  REGISTER
// ============================================================
const RegisterView = ({ onBack, toast }) => {
  const [form, setForm] = useState({name:'', email:'', role:'WORKER'});
  const [loading, setLoading] = useState(false);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const inp = "w-full border rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50";
  const submit = async (e) => {
    e.preventDefault(); setLoading(true);
    try { await Api.register(form.name, form.email, form.role); toast('Registered! Admin approval ka wait karo.','success'); onBack(); }
    catch(err) { toast(err.message||'Error','error'); }
    setLoading(false);
  };
  return (
    <div className="space-y-4 animate-fade-in">
      <button onClick={onBack} className="text-blue-600 text-sm font-semibold flex items-center gap-1">← Back</button>
      <h2 className="text-2xl font-bold text-gray-800">Register</h2>
      <form onSubmit={submit} className="space-y-3">
        <input required value={form.name} onChange={set('name')} placeholder="Aapka naam" className={inp}/>
        <input required type="email" value={form.email} onChange={set('email')} placeholder="Email address" className={inp}/>
        <select value={form.role} onChange={set('role')} className={inp}>
          <option value="WORKER">Worker</option>
          <option value="ADMIN">Admin</option>
        </select>
        <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2">
          {loading ? <Spin s={20}/> : 'Register Karo'}
        </button>
      </form>
    </div>
  );
};

// ============================================================
//  MAIN APP
// ============================================================
const App = () => {
  const [user, setUser] = useState(null);
  const [config, setConfig] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('login'); // login | register
  const [toast, setToast] = useState(null);
  const [loginEmail, setLoginEmail] = useState('');
  const [loginLoading, setLoginLoading] = useState(false);

  const showToast = (msg, type='info') => setToast({msg, type, id: Date.now()});

  useEffect(() => {
    (async () => {
      try {
        const cfg = await Api.getConfig(); setConfig(cfg);
        const stored = localStorage.getItem(SESSION_KEY);
        if (stored) setUser(JSON.parse(stored));
      } catch(e) {}
      setLoading(false);
    })();
  }, []);

  const login = async (e) => {
    e.preventDefault(); setLoginLoading(true);
    try {
      const u = await Api.login(loginEmail);
      setUser(u); localStorage.setItem(SESSION_KEY, JSON.stringify(u));
    } catch(err) { showToast(err.message || 'Login failed', 'error'); }
    setLoginLoading(false);
  };

  const logout = () => { setUser(null); localStorage.removeItem(SESSION_KEY); };

  if (loading) return (
    <div className="min-h-screen flex items-center justify-center bg-gray-50">
      <div className="text-center space-y-3">
        <div className="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto">
          <Ic n="shield" s={28} c="text-white"/>
        </div>
        <Spin s={28}/>
      </div>
    </div>
  );

  if (!user) return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50 p-4">
      <div className="bg-white rounded-3xl shadow-xl w-full max-w-sm p-8 space-y-6">
        <div className="text-center">
          <div className="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-3">
            <Ic n="shield" s={32} c="text-white"/>
          </div>
          <h1 className="text-2xl font-extrabold text-gray-900">GeoFace<span className="text-blue-600">Guard</span></h1>
          <p className="text-gray-500 text-sm mt-1">Geo-Tagged Face Attendance System</p>
        </div>

        {/* Demo mode indicator */}
        {!localStorage.getItem(GAS_URL_KEY) && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700 text-center">
            🟡 Demo Mode — Login: <strong>admin@geo.com</strong> or <strong>rahul@worker.com</strong>
          </div>
        )}

        {view === 'login' ? (
          <form onSubmit={login} className="space-y-3">
            <div>
              <label className="text-xs font-bold text-gray-500 block mb-1">EMAIL</label>
              <input type="email" required value={loginEmail} onChange={e=>setLoginEmail(e.target.value)}
                placeholder="aapka@email.com"
                className="w-full border rounded-2xl p-3.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"/>
            </div>
            <button type="submit" disabled={loginLoading} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 transition-colors">
              {loginLoading ? <Spin s={20}/> : 'Sign In'}
            </button>
            <button type="button" onClick={()=>setView('register')} className="w-full text-blue-600 py-2 font-semibold text-sm">
              Naya account banana hai? Register karo
            </button>
          </form>
        ) : (
          <RegisterView onBack={()=>setView('login')} toast={showToast}/>
        )}
      </div>
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );

  return (
    <>
      {user.role === 'ADMIN'
        ? <AdminDashboard user={user} config={config} setConfig={setConfig} onLogout={logout} toast={showToast}/>
        : <WorkerPortal user={user} config={config} onLogout={logout} toast={showToast}/>
      }
      {toast && <Toast key={toast.id} msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
